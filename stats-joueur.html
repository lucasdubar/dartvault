<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <title>DartVault — Stats Joueur</title>
  <script>
    (function(){
      var t = localStorage.getItem('dartvault_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t === 'colored' ? 'colored' : t);
    })();
  </script>
  <script src="lang.js"></script>
  <style>
    :root {
      --bg:#0A0A0A; --bg2:#141414; --bg3:#1E1E1E; --bg4:#252525;
      --text:#F0F0F0; --dim:#666; --dim2:#444;
      --accent:#E8C547; --accent-glow:rgba(232,197,71,.25);
      --border:rgba(255,255,255,.07);
    }
    [data-theme="dark"] {
      --bg:#0E0F10; --bg2:#161718; --bg3:#1C1E20; --bg4:#242628;
      --text:#F0F0F0; --dim:#777; --dim2:#555;
      --accent:#E8E8E8; --accent-glow:rgba(232,232,232,.15);
      --border:rgba(255,255,255,.07);
    }
    [data-theme="light"] {
      --bg:#F7F0F2; --bg2:#FFFFFF; --bg3:#EDE4E7; --bg4:#E2D6DA;
      --text:#1A0A0E; --dim:#8A6070; --dim2:#C8A0B0;
      --accent:#2A1018; --accent-glow:rgba(22,23,24,.12);
      --border:rgba(22,23,24,.10);
    }
    [data-theme="colored"] {
      --bg:#050D1A; --bg2:#0A1628; --bg3:#102035; --bg4:#162840;
      --text:#C8E8FF; --dim:#4A7FAA; --dim2:#2A4F6A;
      --accent:#38BDF8; --accent-glow:rgba(56,189,248,.25);
      --border:rgba(56,189,248,.18);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:'Exo 2',sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100dvh;
      display:flex; flex-direction:column; align-items:center;
      padding:0 0 40px; overflow-x:hidden;
      transition:background .3s, color .3s;
    }

    /* ── Header ── */
    .page-header {
      width:100%; max-width:520px;
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px;
      position:sticky; top:0; z-index:50;
      background:var(--bg2);
      border-bottom:1px solid var(--border);
    }
    [data-theme="dark"] .page-header {
      background:linear-gradient(180deg,rgba(168,182,200,.14) 0%,#0E0F10 100%);
      border-bottom:1px solid rgba(168,182,200,.18);
      box-shadow:0 2px 20px rgba(0,0,0,.45);
    }
    [data-theme="light"] .page-header {
      background:linear-gradient(180deg,rgba(168,182,200,.5) 0%,#F7F0F2 100%);
      border-bottom:1px solid rgba(168,182,200,.6);
      box-shadow:0 2px 12px rgba(0,0,0,.1);
    }
    [data-theme="colored"] .page-header {
      background:linear-gradient(180deg,rgba(56,189,248,.18) 0%,#050D1A 100%);
      border-bottom:1px solid rgba(56,189,248,.3);
      box-shadow:0 2px 20px rgba(56,189,248,.08);
    }
    .btn-back-page {
      background:var(--bg3); border:1px solid var(--border);
      color:var(--text); border-radius:10px;
      padding:7px 14px; font-family:'Exo 2',sans-serif;
      font-size:.85rem; font-weight:600; cursor:pointer;
      touch-action:manipulation; transition:all .2s;
    }
    .btn-back-page:active { transform:scale(.94); border-color:var(--accent); }
    .page-title {
      font-family:'Rajdhani',sans-serif; font-size:1.25rem; font-weight:700;
      color:var(--accent); letter-spacing:2px;
      text-shadow:0 0 16px var(--accent-glow);
      position:absolute; left:50%; transform:translateX(-50%);
      white-space:nowrap; pointer-events:none;
    }
    [data-theme="dark"] .page-title { text-shadow:0 0 16px rgba(232,232,232,.15); }
    [data-theme="light"] .page-title { text-shadow:none; }
    [data-theme="colored"] .page-title { text-shadow:0 0 20px rgba(56,189,248,.5); }

    /* ── Settings button ── */
    .btn-settings {
      width:38px; height:38px; border-radius:50%; flex-shrink:0;
      background:var(--bg2); border:1px solid var(--border);
      color:var(--dim); font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .2s; touch-action:manipulation;
    }
    .btn-settings:active { transform:scale(.9); border-color:var(--accent); color:var(--accent); }
    .settings-panel {
      display:none; position:fixed; top:62px; right:14px; z-index:500;
      background:var(--bg2); border:1px solid var(--border);
      border-radius:14px; padding:14px 16px; min-width:210px;
      box-shadow:0 8px 32px rgba(0,0,0,.5);
      animation:pop .2s cubic-bezier(.34,1.56,.64,1);
    }
    [data-theme="light"] .settings-panel { box-shadow:0 4px 24px rgba(0,0,0,.12); }
    .settings-panel.open { display:block; }
    .sg-section-label { font-family:'Rajdhani',sans-serif; font-size:.7rem; font-weight:700; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
    .sg-row { display:flex; align-items:center; gap:10px; padding:8px 0; }
    .sg-row + .sg-row { border-top:1px solid var(--border); }
    .sg-row-label { font-family:'Rajdhani',sans-serif; font-size:.95rem; font-weight:700; color:var(--text); flex:1; letter-spacing:.3px; }
    .sg-toggle { position:relative; width:42px; height:24px; flex-shrink:0; }
    .sg-toggle input { opacity:0; width:0; height:0; }
    .sg-slider { position:absolute; inset:0; cursor:pointer; background:var(--bg4); border-radius:24px; border:1px solid rgba(255,255,255,.1); transition:background .2s; }
    .sg-slider::before { content:''; position:absolute; width:18px; height:18px; left:2px; top:2px; background:#fff; border-radius:50%; transition:transform .2s; }
    .sg-toggle input:checked + .sg-slider { background:var(--accent); border-color:var(--accent); }
    .sg-toggle input:checked + .sg-slider::before { transform:translateX(18px); }
    [data-theme="light"] .sg-slider { background:#DDD; border-color:#CCC; }
    [data-theme="light"] .sg-slider::before { background:#FFF; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .sg-theme-pills { display:flex; gap:6px; width:100%; }
    .sg-pill { flex:1; padding:7px 4px; border-radius:9px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:.78rem; font-weight:700; letter-spacing:.5px; text-align:center; border:1.5px solid var(--border); background:var(--bg3); color:var(--dim); transition:all .18s; touch-action:manipulation; }
    .sg-pill:active { transform:scale(.94); }
    .sg-pill.active { background:rgba(232,197,71,.15); border-color:var(--accent); color:var(--accent); }
    [data-theme="light"] .sg-pill.active { background:rgba(22,23,24,.1); }
    [data-theme="colored"] .sg-pill.active { background:rgba(56,189,248,.15); }

    /* ── Contenu ── */
    .page-content {
      width:100%; max-width:520px;
      padding:16px 16px;
      display:flex; flex-direction:column; gap:14px;
    }

    /* ── Hero card ── */
    .hero-card {
      border:1px solid var(--border);
      border-radius:20px; padding:20px 18px;
      position:relative; overflow:hidden;
      /* Glow via background gradient — pas de ::before pour éviter le clip abrupt */
      background:
        radial-gradient(ellipse 100% 120% at 50% -30%,
          var(--accent-glow) 0%,
          transparent 65%),
        var(--bg2);
    }
    [data-theme="colored"] .hero-card {
      border-color:rgba(56,189,248,.3);
      background:
        radial-gradient(ellipse 100% 120% at 50% -30%,
          rgba(56,189,248,.18) 0%,
          transparent 65%),
        rgba(10,22,40,.95);
    }
    [data-theme="light"] .hero-card {
      background:
        radial-gradient(ellipse 100% 120% at 50% -30%,
          rgba(22,23,24,.06) 0%,
          transparent 65%),
        #FFFFFF;
    }

    /* Rank badge haut-droite */
    .hero-rank {
      position:absolute; top:14px; right:16px;
      font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700;
      line-height:1; text-align:center;
    }
    .hero-rank.rank-1 { font-size:1.7rem; filter:drop-shadow(0 0 8px rgba(232,197,71,.7)); }
    .hero-rank.rank-2 { font-size:1.7rem; filter:drop-shadow(0 0 6px rgba(176,184,200,.5)); }
    .hero-rank.rank-3 { font-size:1.7rem; filter:drop-shadow(0 0 6px rgba(205,127,50,.5)); }
    .hero-rank.rank-n  { color:var(--dim); font-size:1rem; }

    /* Identité (emoji + nom sur même ligne) */
    .hero-identity {
      display:flex; align-items:center; gap:12px;
      margin-bottom:16px; padding-right:40px;
    }
    .hero-emoji { font-size:2.2rem; line-height:1; flex-shrink:0; }
    .hero-name-wrap { display:flex; align-items:center; gap:8px; min-width:0; }
    .hero-name {
      font-family:'Rajdhani',sans-serif; font-size:1.9rem; font-weight:700;
      color:var(--text); letter-spacing:.5px; line-height:1;
    }
    .btn-player-switch {
      background:var(--bg3); border:1px solid var(--border);
      color:var(--dim); border-radius:8px;
      width:28px; height:28px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; touch-action:manipulation;
      font-size:.75rem; transition:all .2s;
    }
    .btn-player-switch:active { transform:scale(.9); border-color:var(--accent); color:var(--accent); }
    .btn-player-switch.open { border-color:var(--accent); color:var(--accent); }

    /* Panneau switch joueur */
    .player-switch-panel {
      display:none; background:var(--bg2); border:1px solid var(--border);
      border-radius:14px; overflow:hidden;
      box-shadow:0 8px 28px rgba(0,0,0,.4);
      animation:fadeSlide .2s ease-out;
    }
    .player-switch-panel.open { display:block; }
    .ps-title {
      font-family:'Rajdhani',sans-serif; font-size:.68rem; font-weight:700;
      color:var(--dim); letter-spacing:2px; text-transform:uppercase;
      padding:10px 14px 6px;
    }
    .ps-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 14px; cursor:pointer; touch-action:manipulation;
      transition:background .15s; border-top:1px solid var(--border);
    }
    .ps-item:first-of-type { border-top:none; }
    .ps-item:active { background:rgba(255,255,255,.05); }
    .ps-item.current { background:rgba(255,255,255,.04); }
    .ps-item-emoji { font-size:1.4rem; }
    .ps-item-name {
      font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700;
      color:var(--text); flex:1;
    }
    .ps-item.current .ps-item-name { color:var(--accent); }
    .ps-item-check { font-size:.8rem; color:var(--accent); }

    /* Stats row */
    .hero-stats-row { display:flex; gap:8px; }
    .hero-stat {
      flex:1;
      display:flex; flex-direction:column; align-items:center;
      background:rgba(255,255,255,.04); border-radius:12px;
      padding:10px 6px 8px;
      border:1px solid var(--border);
    }
    [data-theme="light"] .hero-stat { background:rgba(22,23,24,.04); }
    [data-theme="colored"] .hero-stat { border-color:rgba(56,189,248,.12); background:rgba(56,189,248,.04); }
    .hero-stat-val {
      font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700;
      color:var(--accent); line-height:1;
    }
    .hero-stat-lbl {
      font-size:.58rem; color:var(--dim); letter-spacing:.8px;
      text-transform:uppercase; margin-top:4px; font-weight:700;
    }

    /* ── Grille de tuiles 4/ligne ── */
    /* Panneau détail toujours AU-DESSUS des tuiles */
    #game-detail     { order:1; }
    .game-tiles-grid { order:2; }
    .game-tiles-grid {
      display:flex; flex-wrap:wrap;
      gap:8px; justify-content:center;
    }
    /* Base tile — border colorée toujours visible, dégradé argenté neutre */
    .game-tile {
      width:calc(25% - 6px);
      aspect-ratio:1; border-radius:12px;
      border:1.5px solid color-mix(in srgb, var(--tile-color) 28%, transparent);
      background:linear-gradient(145deg,
        color-mix(in srgb, white 6%, var(--bg3)) 0%,
        var(--bg2) 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:4px;
      cursor:pointer; touch-action:manipulation;
      transition:border-color .2s, background .2s, box-shadow .2s;
      position:relative; overflow:hidden;
    }
    .game-tile:active { transform:scale(.91); }

    /* Dark — dégradé argenté subtil */
    [data-theme="dark"] .game-tile {
      background:linear-gradient(145deg,
        rgba(255,255,255,.07) 0%,
        #161718 55%,
        rgba(255,255,255,.02) 100%);
    }
    /* Light — blanc > gris rosé */
    [data-theme="light"] .game-tile {
      background:linear-gradient(145deg, #FFFFFF 0%, #EDE4E7 100%);
      border-color:color-mix(in srgb, var(--tile-color) 22%, transparent);
    }
    /* Colored — dégradé fort de la couleur du jeu */
    [data-theme="colored"] .game-tile {
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 20%, #0A1628) 0%,
        #050D1A 85%);
      border-color:color-mix(in srgb, var(--tile-color) 40%, transparent);
    }

    .game-tile-icon { font-size:clamp(1.4rem,4.5vw,2.8rem); line-height:1; }
    .game-tile-name {
      font-family:'Rajdhani',sans-serif; font-size:clamp(.78rem,1.8vw,1.2rem); font-weight:700;
      color:var(--dim); letter-spacing:.2px; text-align:center;
      padding:0 3px; line-height:1.15;
    }

    /* Barre colorée en bas */
    .game-tile::after {
      content:''; position:absolute; bottom:0; left:0; right:0;
      height:2.5px; background:var(--tile-color); transform:scaleX(0);
      transition:transform .2s cubic-bezier(.4,0,.2,1);
    }
    /* Point indicateur (a des données) */
    .game-tile.has-data::before {
      content:''; position:absolute; top:5px; right:5px;
      width:5px; height:5px; border-radius:50%;
      background:var(--tile-color); opacity:.6;
      transition:opacity .2s;
    }

    /* Has-data — border + gradient plus marqués */
    .game-tile.has-data {
      border-color:color-mix(in srgb, var(--tile-color) 52%, transparent);
    }
    .game-tile.has-data .game-tile-name {
      color:color-mix(in srgb, var(--tile-color) 70%, var(--dim));
    }
    [data-theme="dark"] .game-tile.has-data {
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 14%, rgba(255,255,255,.05)) 0%,
        #161718 100%);
    }
    [data-theme="light"] .game-tile.has-data {
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 10%, #FFFFFF) 0%,
        #EDE4E7 100%);
      border-color:color-mix(in srgb, var(--tile-color) 48%, transparent);
    }
    [data-theme="colored"] .game-tile.has-data {
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 32%, #0A1628) 0%,
        #050D1A 85%);
      border-color:color-mix(in srgb, var(--tile-color) 62%, transparent);
    }

    /* Active */
    .game-tile.active {
      border-color:var(--tile-color);
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 22%, var(--bg2)) 0%,
        var(--bg2) 100%);
      box-shadow:0 0 18px color-mix(in srgb, var(--tile-color) 32%, transparent),
                 inset 0 0 10px color-mix(in srgb, var(--tile-color) 10%, transparent);
    }
    [data-theme="colored"] .game-tile.active {
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 42%, #0A1628) 0%,
        color-mix(in srgb, var(--tile-color) 14%, #050D1A) 100%);
    }
    [data-theme="light"] .game-tile.active {
      background:linear-gradient(145deg,
        color-mix(in srgb, var(--tile-color) 18%, #FFFFFF) 0%,
        color-mix(in srgb, var(--tile-color) 8%, #EDE4E7) 100%);
    }
    .game-tile.active .game-tile-name { color:var(--tile-color); font-weight:700; }
    .game-tile.active::after { transform:scaleX(1); }
    .game-tile.active.has-data::before { opacity:0; }

    /* ── Panneau détail ── */
    .game-detail-panel {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:16px; overflow:hidden;
      border-top:3px solid var(--panel-color, var(--border));
      animation:fadeSlide .22s ease-out;
    }
    [data-theme="colored"] .game-detail-panel { background:rgba(10,22,40,.9); }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

    .gd-header { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; }
    .gd-icon { font-size:1.4rem; flex-shrink:0; }
    .gd-title {
      font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700;
      color:var(--text); letter-spacing:.5px; flex:1;
    }
    .gd-record { text-align:right; }
    .gd-wins {
      font-family:'Rajdhani',sans-serif; font-size:1.25rem; font-weight:700;
      color:var(--panel-color, var(--accent)); line-height:1;
    }
    .gd-wg { font-size:.62rem; color:var(--dim); letter-spacing:.5px; margin-top:2px; }

    .gd-bar-wrap { padding:0 16px 10px; }
    .gd-bar-track { height:5px; background:var(--bg4); border-radius:3px; overflow:hidden; }
    .gd-bar-fill {
      height:100%; border-radius:3px;
      background:var(--panel-color, var(--accent));
      transition:width .7s cubic-bezier(.4,0,.2,1);
    }
    .gd-bar-labels { display:flex; justify-content:space-between; font-size:.65rem; color:var(--dim); margin-top:5px; }

    .gd-chips { display:flex; gap:6px; flex-wrap:wrap; padding:4px 16px 16px; }
    .gd-chip {
      background:var(--bg3); border:1px solid var(--border);
      border-radius:8px; padding:6px 12px;
      font-family:'Rajdhani',sans-serif; font-size:.85rem; font-weight:600;
      color:var(--dim); white-space:nowrap;
    }
    [data-theme="colored"] .gd-chip { border-color:rgba(56,189,248,.12); }
    .gd-chip strong { color:var(--text); font-weight:700; }
    .gd-empty { padding:14px 16px 18px; font-size:.82rem; color:var(--dim2); font-style:italic; text-align:center; }

    @keyframes pop { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }

    /* ── TABLETTE portrait : pleine largeur + hero card agrandi ── */
    @media (min-width:700px) {
      .page-header { max-width:100%; }
      .page-content { max-width:100%; padding:16px 28px; }
      /* Hero card plus imposant */
      .hero-card { padding:26px 24px; }
      .hero-emoji { font-size:2.8rem; }
      .hero-name-wrap { min-width:0; flex:1; }
      .hero-name {
        font-size:2.5rem;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        min-width:0;
      }
      .hero-stat-val { font-size:1.9rem; }
      .hero-stats-row { gap:12px; margin-top:4px; }
    }

    /* ── PAYSAGE TABLETTE : layout 2 colonnes ── */
    @media (orientation:landscape) and (min-width:700px) and (min-height:500px) {
      .page-content {
        display:grid;
        grid-template-columns:360px 1fr;
        grid-template-rows:auto 1fr auto;
        gap:20px;
        align-items:stretch;
      }
      /* Hero card : occupe toute la hauteur de la colonne gauche */
      .hero-card {
        grid-column:1; grid-row:1/4; order:0;
        display:flex; flex-direction:column; justify-content:center;
        gap:28px; padding:32px 24px;
      }
      /* Identité : emoji au-dessus du nom, centré */
      .hero-identity {
        flex-direction:column; align-items:center;
        gap:12px; margin-bottom:0; padding-right:0;
      }
      .hero-emoji { font-size:5rem; }
      .hero-name-wrap { flex-direction:column; align-items:center; gap:10px; }
      .hero-name {
        font-size:2.6rem; text-align:center;
        white-space:normal; overflow:visible; text-overflow:clip;
      }
      .btn-player-switch { width:34px; height:34px; font-size:.85rem; }
      /* Stats : empilées verticalement, plus grandes */
      .hero-stats-row { flex-direction:column; gap:10px; }
      .hero-stat { padding:18px 16px; flex-direction:row; justify-content:space-between; align-items:center; }
      .hero-stat-val { font-size:clamp(2.4rem,3.5vw,3.2rem); }
      .hero-stat-lbl { font-size:clamp(.8rem,1vw,1rem); letter-spacing:1px; margin-top:0; }
      /* Sélecteur de période : en haut de la colonne droite */
      .period-selector { grid-column:2; grid-row:1; order:1; justify-content:flex-start; margin-bottom:0; }
      /* Détail puis tuiles dans la colonne droite */
      #game-detail     { grid-column:2; grid-row:2; order:2; }
      .game-tiles-grid { grid-column:2; grid-row:3; order:3; }
      /* 5 tuiles par ligne dans la colonne droite */
      .game-tile { width:calc(20% - 7px); }
    }

    @media(prefers-reduced-motion:reduce){
      *{animation-duration:.01ms!important;transition-duration:.01ms!important;}
    }

    /* ── Period Selector ── */
    .period-selector { position:relative; display:flex; justify-content:center; margin-bottom:14px; }
    .btn-period {

// ══════════════════════════════════════════════════════════════════════
// DONNÉES
// ══════════════════════════════════════════════════════════════════════
const params   = new URLSearchParams(location.search);
const fullName = params.get('p') || '';
function getWins()      { try{ return JSON.parse(localStorage.getItem('dartvault_wins'))||{}; }      catch(e){ return {}; } }
function getGameStats() { try{ return JSON.parse(localStorage.getItem('dartvault_game_stats'))||{}; } catch(e){ return {}; } }
function getProfiles()  { try{ return JSON.parse(localStorage.getItem('dartvault_profiles'))||[]; }  catch(e){ return []; } }

function todayKey()  { return new Date().toISOString().slice(0,10); }
function weekKey()   { const d=new Date(),day=d.getDay()||7; d.setDate(d.getDate()-day+1); return d.toISOString().slice(0,10); }
function monthKey()  { return new Date().toISOString().slice(0,7); }

let currentPeriod = localStorage.getItem('dartvault_period_filter') || 'daily';
let playerWins  = {};
let playerStats = {};

function getWinsForPeriod(key) {
  const pw = playerWins[key];
  if (!pw) return 0;
  if (currentPeriod === 'alltime') return pw.total || 0;
  if (currentPeriod === 'daily')   return (pw.daily  ||{})[todayKey()] || 0;
  if (currentPeriod === 'weekly')  return (pw.weekly ||{})[weekKey()]  || 0;
  if (currentPeriod === 'monthly') return (pw.monthly||{})[monthKey()] || 0;
  return 0;
}
function getGamesForPeriod(key) {
  const ps = playerStats[key];
  if (!ps) return 0;
  if (currentPeriod === 'alltime') return ps.games || 0;
  const _pv = currentPeriod === 'daily' ? (ps.daily||{})[todayKey()] : currentPeriod === 'weekly' ? (ps.weekly||{})[weekKey()] : (ps.monthly||{})[monthKey()];
  return typeof _pv === 'number' ? _pv : (_pv && _pv.games) || 0;
}
function getPeriodStats(key) {
  const ps = playerStats[key];
  if (!ps || currentPeriod === 'alltime') return ps || null;
  const _pv = currentPeriod === 'daily' ? (ps.daily||{})[todayKey()] : currentPeriod === 'weekly' ? (ps.weekly||{})[weekKey()] : (ps.monthly||{})[monthKey()];
  return (_pv && typeof _pv === 'object') ? _pv : null;
}

// ══════════════════════════════════════════════════════════════════════
// CLASSEMENT GLOBAL (pour badge)
// ══════════════════════════════════════════════════════════════════════
function computeRank(name) {
  const allWins   = getWins();
  const profiles  = getProfiles();
  const active    = new Set(profiles.map(p => p.emoji+' '+p.name));
  const totals    = {};
  Object.entries(allWins).forEach(([n, data]) => {
    if (!active.has(n)) return;
    let tot = 0;
    GAME_CONFIGS.forEach(g => { if (data[g.key]) tot += (data[g.key].total||0); });
    totals[n] = tot;
  });
  // S'assurer que le joueur courant est inclus (même avec 0 victoires)
  if (!(name in totals)) totals[name] = 0;
  const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
  const idx    = sorted.findIndex(([n]) => n === name);
  return idx >= 0 ? idx + 1 : sorted.length;
}

function renderRankBadge(rank) {
  const el = document.getElementById('hero-rank');
  if (!el) return;
  el.className = 'hero-rank';
  if (rank === 1)      { el.textContent = '🏆'; el.classList.add('rank-1'); }
  else if (rank === 2) { el.textContent = '🥈'; el.classList.add('rank-2'); }
  else if (rank === 3) { el.textContent = '🥉'; el.classList.add('rank-3'); }
  else                 { el.textContent = '#'+rank; el.classList.add('rank-n'); }
}

// ══════════════════════════════════════════════════════════════════════
// RENDU PRINCIPAL
// ══════════════════════════════════════════════════════════════════════
function render() {
  if (!fullName) return;

  const profiles = getProfiles();
  const profile  = profiles.find(p => (p.emoji+' '+p.name) === fullName);
  const emoji    = profile ? profile.emoji : (fullName.split(' ')[0] || '👤');
  const name     = profile ? profile.name  : (fullName.slice(fullName.indexOf(' ')+1) || fullName);

  document.getElementById('hero-emoji').textContent = emoji;
  document.getElementById('hero-name').textContent  = name;

  const allWins      = getWins();
  const allGameStats = getGameStats();
  playerWins   = allWins[fullName] || {};
  playerStats  = allGameStats[fullName] || {};

  let totalWins = 0, totalGames = 0;
  GAME_CONFIGS.forEach(g => {
    totalWins  += getWinsForPeriod(g.key);
    totalGames += getGamesForPeriod(g.key);
  });
  const wr = totalGames > 0 ? Math.round(totalWins/totalGames*100) : null;

  document.getElementById('total-wins').textContent    = totalWins;
  document.getElementById('total-games').textContent   = totalGames;
  document.getElementById('total-winrate').textContent = wr !== null ? wr+'%' : '—';

  renderRankBadge(computeRank(fullName));
  renderTiles();

  // Sélectionner auto le 1er jeu avec données pour la période
  const first = GAME_CONFIGS.find(g => getGamesForPeriod(g.key) > 0);
  if (first) selectGame(first.key);
  else document.getElementById('game-detail').innerHTML = '';
}

// ── Tuiles ─────────────────────────────────────────────────────────
function renderTiles() {
  const grid = document.getElementById('game-tiles');
  grid.innerHTML = GAME_CONFIGS.map(g => {
    const hasData = getGamesForPeriod(g.key) > 0;
    const cls     = ['game-tile', hasData ? 'has-data' : ''].filter(Boolean).join(' ');
    const label   = g[lang] || g.en || g.fr;
    return `<div class="${cls}" id="tile-${g.key}" style="--tile-color:${g.color}" onclick="selectGame('${g.key}')">
      <div class="game-tile-icon">${g.icon}</div>
      <div class="game-tile-name">${label}</div>
    </div>`;
  }).join('');
}

function selectGame(key) {
  document.querySelectorAll('.game-tile').forEach(t => t.classList.remove('active'));
  const tile = document.getElementById('tile-'+key);
  if (tile) tile.classList.add('active');
  renderDetail(key);
}

// ── Panneau détail ──────────────────────────────────────────────────
function renderDetail(key) {
  const container = document.getElementById('game-detail');
  if (!key) { container.innerHTML = ''; return; }

  const g    = GAME_CONFIGS.find(c => c.key === key);
  if (!g) return;

  const ps      = playerStats[key] || null;
  const wins    = getWinsForPeriod(key);
  const games   = getGamesForPeriod(key);
  const pct     = games > 0 ? Math.round(wins/games*100) : 0;
  const hasData = games > 0;
  const fullGameName = (GAME_FULL[lang]||GAME_FULL.en||GAME_FULL.fr)[key] || g.en || g.fr;

  let barHtml = '', chipsHtml = '';

  if (hasData) {
    barHtml = `<div class="gd-bar-wrap">
      <div class="gd-bar-track"><div class="gd-bar-fill" style="width:${pct}%"></div></div>
      <div class="gd-bar-labels">
        <span>${L.winsLabel(wins)}</span>
        <span>${L.winsPct(pct)}</span>
      </div>
    </div>`;
    const chips = buildChips(key, ps);
    if (chips.length) chipsHtml = `<div class="gd-chips">${chips.map(c=>`<div class="gd-chip">${c}</div>`).join('')}</div>`;
  } else {
    chipsHtml = `<div class="gd-empty">${L.noData}</div>`;
  }

  container.innerHTML = `<div class="game-detail-panel" style="--panel-color:${g.color}">
    <div class="gd-header">
      <div class="gd-icon">${g.icon}</div>
      <div class="gd-title">${fullGameName}</div>
      <div class="gd-record">
        <div class="gd-wins">${wins}<span style="font-size:.75rem;opacity:.4;font-weight:600">/${games}</span></div>
        <div class="gd-wg">${L.wg}</div>
      </div>
    </div>
    ${barHtml}${chipsHtml}
  </div>`;
}

// ── Chips par jeu ───────────────────────────────────────────────────
function buildChips(key, ps) {
  if (!ps) return [];
  const pst = getPeriodStats(key) || ps;
  const c = [];
  const d = L.drt;
  if (key==='501') {
    const avg = (pst.totalThrows||0)>0 ? ((pst.totalScore||0)/pst.totalThrows).toFixed(1) : '—';
    c.push(`${L.avg}: <strong>${avg}</strong>`);
    c.push(`${d}: <strong>${pst.totalDarts||0}</strong>`);
    if ((pst.doubleAttempts||0)>0) c.push(`D%: <strong>${Math.round((pst.doubleHits||0)/pst.doubleAttempts*100)}%</strong>`);
  } else if (key==='cricket') {
    c.push(`Zones: <strong>${pst.closedZones||0}</strong>`);
    c.push(`${d}: <strong>${pst.totalDarts||0}</strong>`);
  } else if (key==='blackjack') {
    const avg = ((pst.moneyDelta||0)/(pst.games||1)).toFixed(1);
    const sign = parseFloat(avg)>=0?'+':'';
    const col  = parseFloat(avg)>=0?'#4CAF50':'#F44336';
    c.push(`${L.avgGame}: <strong style="color:${col}">${sign}${avg}€</strong>`);
    c.push(`🃏 Blackdarts: <strong>${pst.blackdarts||0}</strong>`);
  } else if (key==='bataille') {
    const acc = (pst.totalShots||0)>0 ? Math.round((pst.hits||0)/pst.totalShots*100) : 0;
    c.push(`💥 ${L.hits}: <strong>${pst.hits||0}</strong>`);
    c.push(`💧 ${L.misses}: <strong>${(pst.totalShots||0)-(pst.hits||0)}</strong>`);
    c.push(`🎯 ${acc}%`);
  } else if (key==='territoire') {
    c.push(`✓ ${L.captures}: <strong>${pst.captures||0}</strong>`);
    c.push(`🛡️ ${L.shields}: <strong>${pst.shields||0}</strong>`);
    c.push(`✗ ${L.neutralized}: <strong>${pst.neutralized||0}</strong>`);
  } else if (key==='shooter') {
    c.push(`❤️ ${L.dmg}: <strong>${pst.hpDealt||0}</strong>`);
    c.push(`🔫 ${L.bullets}: <strong>${pst.bulletsGained||0}</strong>`);
    c.push(`💚 ${L.heals}: <strong>${pst.hpHealed||0}</strong>`);
  } else if (key==='race500') {
    c.push(`<strong style="color:#4CAF50">+${pst.pointsStolen||0}</strong> ${L.stolen}`);
    c.push(`<strong style="color:#F44336">-${pst.pointsLost||0}</strong> ${L.lost}`);
  } else if (key==='dartspong') {
    const acc = (pst.totalDarts||0)>0 ? Math.round((pst.zonesEliminated||0)/pst.totalDarts*100) : 0;
    c.push(`🎯 ${acc}%`); c.push(`${d}: <strong>${pst.totalDarts||0}</strong>`);
  } else if (key==='shanghai') {
    const acc = (pst.totalDarts||0)>0 ? Math.round((pst.zonesHit||0)/pst.totalDarts*100) : 0;
    c.push(`🎯 ${acc}%`); c.push(`🗼 Shanghais: <strong>${pst.shanghais||0}</strong>`);
  } else if (key==='horloge') {
    const acc = (pst.totalDarts||0)>0 ? Math.round((pst.zonesHit||0)/pst.totalDarts*100) : 0;
    c.push(`🎯 ${acc}%`); c.push(`${d}: <strong>${pst.totalDarts||0}</strong>`);
  }
  return c;
}

render();

// ══════════════════════════════════════════════════════════════════════
// PERIOD SELECTOR
// ══════════════════════════════════════════════════════════════════════
(function() {
  const PERIODS_ALL = {
    fr: { daily:'Quotidien', weekly:'Hebdomadaire', monthly:'Mensuel', alltime:'All Time' },
    en: { daily:'Daily', weekly:'Weekly', monthly:'Monthly', alltime:'All Time' },
    de: { daily:'Täglich', weekly:'Wöchentlich', monthly:'Monatlich', alltime:'Gesamt' },
    nl: { daily:'Dagelijks', weekly:'Wekelijks', monthly:'Maandelijks', alltime:'Totaal' },
    es: { daily:'Diario', weekly:'Semanal', monthly:'Mensual', alltime:'Total' },
  };
  const PERIODS = PERIODS_ALL[lang] || PERIODS_ALL.en;
  const btn      = document.getElementById('btn-period');
  const dropdown = document.getElementById('period-dropdown');
  const label    = document.getElementById('period-label');

  // Appliquer les labels i18n
  document.querySelectorAll('.period-option').forEach(opt => {
    opt.textContent = PERIODS[opt.dataset.period] || opt.dataset.period;
  });
  label.textContent = PERIODS[currentPeriod];
  document.querySelectorAll('.period-option').forEach(o => o.classList.toggle('active', o.dataset.period === currentPeriod));

  btn.addEventListener('click', e => {
    e.stopPropagation();
    btn.classList.toggle('open');
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => {
    btn.classList.remove('open');
    dropdown.classList.remove('open');
  });
  document.querySelectorAll('.period-option').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      currentPeriod = opt.dataset.period;
      localStorage.setItem('dartvault_period_filter', currentPeriod);
      label.textContent = PERIODS[currentPeriod];
      document.querySelectorAll('.period-option').forEach(o => o.classList.toggle('active', o.dataset.period === currentPeriod));
      btn.classList.remove('open');
      dropdown.classList.remove('open');
      render();
    });
  });
})();

// ══════════════════════════════════════════════════════════════════════
// PLAYER SWITCHER
// ══════════════════════════════════════════════════════════════════════
(function(){
  const btn   = document.getElementById('btn-player-switch');
  const panel = document.getElementById('player-switch-panel');
  if (!btn || !panel) return;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    if (isOpen) buildSwitcher();
  });
  document.addEventListener('click', e => {
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
      btn.classList.remove('open');
    }
  });

  function buildSwitcher() {
    const profiles = getProfiles();
    const _noProf = lang==='fr'?'Aucun profil':lang==='de'?'Kein Profil':'No profiles';
    if (!profiles.length) { panel.innerHTML = `<div class="ps-title" style="padding-bottom:10px;">${_noProf}</div>`; return; }
    const title = lang==='fr'?'CHANGER DE JOUEUR':lang==='de'?'SPIELER WECHSELN':'SWITCH PLAYER';
    const rows = profiles.map(p => {
      const pName = p.emoji + ' ' + p.name;
      const isCurrent = pName === fullName;
      return `<div class="ps-item${isCurrent?' current':''}" onclick="switchPlayer('${encodeURIComponent(pName)}')">
        <div class="ps-item-emoji">${p.emoji}</div>
        <div class="ps-item-name">${p.name}</div>
        ${isCurrent ? '<div class="ps-item-check">✓</div>' : ''}
      </div>`;
    }).join('');
    panel.innerHTML = `<div class="ps-title">${title}</div>${rows}`;
  }
})();

function switchPlayer(encodedName) {
  location.href = 'stats-joueur.html?p=' + encodedName;
}
</script>
